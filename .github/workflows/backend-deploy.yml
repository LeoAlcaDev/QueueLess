name: Backend Deploy (ECS Fargate)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

# Secrets requeridos en el repo (Settings > Secrets and variables > Actions):
#   AWS_DEPLOY_ROLE_ARN  -> output github_actions_role_arn de Terraform
# Variables requeridas (Settings > Secrets and variables > Actions > Variables):
#   AWS_REGION           -> ej. us-east-1
#   ECR_REPOSITORY       -> ej. queueless-backend
#   ECS_CLUSTER          -> ej. queueless-prod-cluster
#   ECS_SERVICE          -> ej. queueless-prod-backend
#   ECS_TASK_FAMILY      -> ej. queueless-prod-backend
#   ECS_CONTAINER_NAME   -> backend

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write       # necesario para OIDC con AWS
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" -t "$REGISTRY/$REPOSITORY:latest" ./backend
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_FAMILY }}" \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
