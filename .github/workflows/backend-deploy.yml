name: Backend Deploy (ECS Fargate)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".aws/task-definition.json"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

# Secret requerido (Settings > Secrets and variables > Actions > Secrets):
#   AWS_DEPLOY_ROLE_ARN  -> output github_actions_role_arn de Terraform
#
# Variables requeridas (Settings > Secrets and variables > Actions > Variables):
#   AWS_REGION           -> ej. us-east-1
#   AWS_ACCOUNT_ID       -> ej. 123456789012  (aws sts get-caller-identity)
#   ECR_REPOSITORY       -> queueless-backend
#   ECS_CLUSTER          -> queueless-prod-cluster
#   ECS_SERVICE          -> queueless-prod-backend
#   ECS_CONTAINER_NAME   -> backend
#   S3_BUCKET            -> output s3_bucket de Terraform
#   RDS_ENDPOINT         -> output rds_endpoint de Terraform

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write       # OIDC con AWS
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" -t "$REGISTRY/$REPOSITORY:latest" ./backend
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      # Reemplaza los placeholders del task-definition.json con valores
      # reales tomados de GitHub Variables. Generamos un archivo nuevo
      # para no ensuciar el checkout.
      - name: Render placeholders into task-definition.json
        env:
          ACCOUNT_ID:   ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION:   ${{ vars.AWS_REGION }}
          S3_BUCKET:    ${{ vars.S3_BUCKET }}
          RDS_ENDPOINT: ${{ vars.RDS_ENDPOINT }}
        run: |
          sed \
            -e "s|<ACCOUNT_ID>|$ACCOUNT_ID|g" \
            -e "s|<AWS_REGION>|$AWS_REGION|g" \
            -e "s|<S3_BUCKET>|$S3_BUCKET|g" \
            -e "s|<RDS_ENDPOINT>|$RDS_ENDPOINT|g" \
            .aws/task-definition.json > task-definition.rendered.json
          echo "--- rendered task definition ---"
          cat task-definition.rendered.json

      - name: Render new task definition with updated image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.rendered.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
