spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    properties:
      hibernate:
        format_sql: false

server:
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: WARN
    pe.edu.utec.queueless: INFO

queueless:
  pago:
    # Por defecto 'mock' en prod: este proyecto es académico y no procesa
    # pagos reales. Override con la env PAGO_GATEWAY=mercadopago si se quisiera
    # apuntar al sandbox real.
    gateway: ${PAGO_GATEWAY:mock}
  storage:
    impl: ${STORAGE_IMPL:s3}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    # Sin SMTP configurado en prod (MAIL_HOST="") el MailHealthIndicator
    # reporta DOWN y /actuator/health devuelve 503, lo que hace que el ALB
    # marque el task unhealthy y ECS lo mate en loop durante el deploy.
    mail:
      enabled: false
