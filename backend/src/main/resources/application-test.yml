spring:
  # TestContainers maneja la URL en runtime; estos defaults se sobreescriben
  jpa:
    properties:
      hibernate:
        format_sql: false
  flyway:
    # En tests aplicamos el schema completo (V1..V5) pero NO los seeds de demo (V99)
    locations: classpath:db/migration
    target: 5

logging:
  level:
    root: WARN
    pe.edu.utec.queueless: INFO

queueless:
  pago:
    gateway: mock
  storage:
    impl: local
  firebase:
    enabled: false
