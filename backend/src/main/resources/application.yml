spring:
  application:
    name: queueless
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate         # Flyway maneja el schema, no Hibernate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Lima
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Configuración propia de la aplicación
queueless:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-prod-this-must-be-32-bytes-or-more}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}    # 24 horas
    issuer: queueless
  delivery:
    busqueda-timeout-minutos: 4
  pedido:
    expiracion-minutos: 30
  queuepoints:
    puntos-por-entrega: 50
  waittime:
    pedidos-minimos-fase2: 50
    retraining-cron: "0 */15 * * * *"               # cada 15 min
  storage:
    impl: ${STORAGE_IMPL:local}                     # local | s3
    local-base-path: ./uploads
    s3:
      region: ${AWS_REGION:us-east-1}
      bucket: ${AWS_S3_BUCKET:}
  pago:
    gateway: ${PAGO_GATEWAY:mock}                   # mock | mercadopago
    mercadopago:
      access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    credentials-base64: ${FIREBASE_CREDENTIALS_JSON:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
